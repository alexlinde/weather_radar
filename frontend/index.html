<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Radar</title>

  <!-- MapLibre GL JS -->
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>

  <!-- three.js (radar overlay renderer) -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Map container -->
  <div id="map"></div>

  <!-- Mobile: hamburger toggle for control panel (hidden on desktop via CSS) -->
  <button id="btn-mobile-toggle" title="Toggle controls" aria-label="Toggle controls">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
      <rect x="3" y="5" width="18" height="2" rx="1"/>
      <rect x="3" y="11" width="18" height="2" rx="1"/>
      <rect x="3" y="17" width="18" height="2" rx="1"/>
    </svg>
  </button>

  <!-- Expand button (visible only in embedded contexts — WebView / iframe) -->
  <button id="btn-expand" title="Full screen" aria-label="Expand to full screen">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
      <path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/>
    </svg>
  </button>

  <!-- Control panel (top-right on desktop, bottom sheet on mobile) -->
  <div id="controls">
    <h2>Weather Radar</h2>

    <!-- View mode -->
    <div class="control-row">
      <div class="control-label"><span>View</span></div>
      <div class="seg-control" id="view-mode-seg">
        <button class="seg-btn active" data-mode="composite">Composite</button>
        <button class="seg-btn" data-mode="3d">3D</button>
        <button class="seg-btn" data-mode="volume">Volume</button>
      </div>
    </div>

    <!-- Radar preset -->
    <div class="control-row">
      <div class="control-label"><span>Filter</span></div>
      <div class="seg-control seg-control-4" id="preset-seg">
        <button class="seg-btn active" data-preset="all">All</button>
        <button class="seg-btn" data-preset="precip">Precip</button>
        <button class="seg-btn" data-preset="severe">Severe</button>
        <button class="seg-btn" data-preset="custom">Custom</button>
      </div>
    </div>

    <!-- Intensity slider -->
    <div class="control-row">
      <div class="control-label">
        <span>Intensity</span>
        <span id="opacity-value">80%</span>
      </div>
      <input
        type="range"
        id="opacity-slider"
        min="0" max="1" step="0.01" value="0.8"
        aria-label="Radar intensity"
      />
    </div>

    <!-- Vertical exaggeration (shown only in 3D/Volume) -->
    <div class="control-row" id="row-exaggeration" style="display:none">
      <div class="control-label">
        <span>Vert. scale</span>
        <span id="exag-value">1x</span>
      </div>
      <input
        type="range"
        id="exag-slider"
        min="1" max="10" step="0.5" value="1"
        aria-label="Vertical exaggeration"
      />
    </div>

    <!-- dBZ cutoff controls (shown only for Custom preset) -->
    <div class="control-row" id="row-dbz-cutoff" style="display:none">
      <div class="control-label">
        <span>dBZ range</span>
        <span id="dbz-range-value">5 – 75</span>
      </div>
      <div class="dual-range">
        <input
          type="range"
          id="dbz-min-slider"
          min="-30" max="75" step="5" value="5"
          aria-label="Minimum dBZ cutoff"
        />
        <input
          type="range"
          id="dbz-max-slider"
          min="-30" max="75" step="5" value="75"
          aria-label="Maximum dBZ cutoff"
        />
      </div>
    </div>

    <!-- Action buttons -->
    <div class="control-row btn-row">
      <button id="btn-refresh" title="Re-fetch latest frames">Refresh</button>
      <button id="btn-reset-view" title="Reset to CONUS view">Reset view</button>
    </div>

    <!-- Status -->
    <div class="status-row">
      <div id="status-dot" class="loading"></div>
      <div id="timestamp">Loading frames…</div>
    </div>
  </div>

  <!-- Animation bar (bottom-center) -->
  <div id="animation-bar">
    <button id="btn-play" title="Play / Pause" aria-label="Play or pause animation">
      <svg id="icon-play" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
        <polygon points="6,4 20,12 6,20" />
      </svg>
      <svg id="icon-pause" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="display:none">
        <rect x="5" y="4" width="4" height="16" />
        <rect x="15" y="4" width="4" height="16" />
      </svg>
    </button>

    <input
      type="range"
      id="frame-scrubber"
      min="0" max="0" step="1" value="0"
      aria-label="Frame scrubber"
    />

    <span id="frame-time">--:--</span>
    <span id="frame-counter">0/0</span>

    <select id="speed-select" aria-label="Playback speed">
      <option value="1000">0.5x</option>
      <option value="500" selected>1x</option>
      <option value="250">2x</option>
      <option value="150">3x</option>
    </select>
  </div>

  <!-- Legend toggle (bottom-right) -->
  <div id="legend-toggle">
    <button id="btn-legend">Show legend</button>
  </div>

  <!-- Legend panel -->
  <div id="legend" role="complementary" aria-label="Reflectivity colour scale"></div>

  <!-- App entry point (ES module) -->
  <script type="module" src="app.js"></script>
</body>
</html>
