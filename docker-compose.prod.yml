services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  app:
    build: .
    restart: unless-stopped
    environment:
      - DATA_DIR=/data
    volumes:
      - ./data:/data
    env_file:
      - .env
    expose:
      - "8080"

volumes:
  caddy_data:
  caddy_config:
